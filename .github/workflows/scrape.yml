name: scrape-taipower-power

# 每 15 分鐘抓台電全能源別即時資料(錯開整點尖峰，同 windfarmTaiwan 實測經驗)
on:
  schedule:
    - cron: "5,20,35,50 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape-power
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install requests
      - name: Run scraper
        run: python taipower_power_scraper.py
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/power_realtime.json docs/power_history.json
          [ -f docs/grid_status.json ] && git add docs/grid_status.json || true
          git diff --staged --quiet || git commit -m "chore: update power data $(date -u +%FT%TZ)"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push
