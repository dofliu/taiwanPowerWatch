name: android-build

# 手動觸發建置 Android debug APK(免本機 Android Studio)。
# android/ 平台目錄不進版控，於 CI 由 Capacitor 即時產生(乾淨、無大量生成檔)。
on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install Capacitor
        run: npm install
      - name: Generate Android platform
        run: npx cap add android
      - name: Generate icons & splash screens
        run: npx capacitor-assets generate --android --iconBackgroundColor '#0a2a3a' --iconBackgroundColorDark '#06212e' --splashBackgroundColor '#0a2a3a' --splashBackgroundColorDark '#0a2a3a'
      - name: Sync web assets
        run: npx cap sync android
      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: taiwanPowerWatch-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
